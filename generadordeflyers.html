<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Flyers (referencia)</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f8fafc; color: #0f172a; display: grid; place-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; border: 1px solid #cbd5e1; border-radius: 12px; padding: 24px; max-width: 640px; box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08); }
        a { color: #2563eb; }
        code { background: #e2e8f0; padding: 2px 6px; border-radius: 6px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Generador de Flyers</h1>
        <p>Este archivo quedó como referencia para evitar drift entre implementaciones.</p>

        <p>Usa la vista <a href="public/">/public/</a> y entra a la pestaña <strong>Flyers</strong>.</p>
    </div>
